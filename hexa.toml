# hexa.toml — hexa-bio standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-bio
# Provenance: extracted from nexus/sim_bridge/weave/ on 2026-05-04
#             (canonical-from cycle 24, 2026-04-29 — canon sister)

[package]
name = "hexa-bio"
version = "1.0.0"
entry = "cli/hexa-bio.hexa"
description = "Molecular Toolkit (HEXA family): WEAVE/NANOBOT/RIBOZYME/VIROCAPSID — n=6 invariant lattice (σ(6)=12, τ(6)=4, φ(6)=2, J₂=24). 1/4 verbs (weave) wired with cage-assembly ODE + Caspar-Klug Bayesian audit; 3/4 axes (nanobot/ribozyme/virocapsid) ship as stub placeholders with falsifier preregister (raw#10 honest C3)."
license = "Apache-2.0"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/hexa-bio"
homepage = "https://github.com/need-singularity/hexa-bio"
readme = "README.md"
keywords = ["molecular-toolkit", "hexa-family", "weave", "nanobot", "ribozyme", "virocapsid", "caspar-klug", "n6-invariant"]
categories = ["bioinformatics", "molecular-simulation", "structural-biology"]

[lib]
# Library entry — importable by other hexa packages.
entry = "weave/module/weave.hexa"

[[bin]]
name = "hexa-bio"
path = "cli/hexa-bio.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_weave.hexa",
    "tests/test_nanobot.hexa",
    "tests/test_ribozyme.hexa",
    "tests/test_virocapsid.hexa",
    "tests/test_selftest.hexa",
]

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager (hexa-lang) at install time.
# Phases: pre   → optional python_bridge deps (numpy/scipy for weave only;
#                 OPT-IN via HEXA_BIO_WITH_NUMPY=1, default skipped).
#         post  → quick selftest (warn-only, not a blocker).
[scripts]
install = "install.hexa"

# ── Modules manifest (4 verbs + selftest) ─────────────────
# weave    — IMPORTED from nexus/sim_bridge/weave/ (cycle 24 canonical)
# nanobot  — STUB (placeholder + falsifier definition; numerical impl deferred)
# ribozyme — STUB (placeholder + falsifier definition; numerical impl deferred)
# virocapsid — STUB (placeholder + falsifier definition; numerical impl deferred)
[modules]
hexa = [
    "weave/module/weave.hexa",
    "nanobot/module/nanobot.hexa",
    "ribozyme/module/ribozyme.hexa",
    "virocapsid/module/virocapsid.hexa",
    "selftest/module/selftest.hexa",
]
python_bridge_aux = [
    # weave-only (raw#9 .own N opt-out — numpy/scipy heavy lifting).
    # Loaded only when HEXA_BIO_WITH_NUMPY=1; pure-hexa path is default.
    "_python_bridge/module/cage_assembly_simulation.py",
    "_python_bridge/module/polyhedral_cage_bayesian_audit.py",
]

# ── Dependencies ───────────────────────────────────────────
# hexa stdlib: required for all 4 verbs (CLI dispatch, falsifier table).
# Optional Python deps (weave's empirical-sandbox path only):
#   numpy >= 1.24    — array ops for ODE state vec     (BSD-3, compatible)
#   scipy >= 1.11    — Bayesian audit pipeline         (BSD-3, compatible)
#
# All other paths (nanobot/ribozyme/virocapsid stubs + CLI router + status)
# require ZERO Python — pure hexa-lang.

[dependencies]
hexa-lang = ">=1.0.0"

[dependencies.optional]
python_aux_bsd3 = "numpy >= 1.24, scipy >= 1.11 (weave empirical path only; BSD-3 in-process safe; opt-in via HEXA_BIO_WITH_NUMPY=1)"

# ── Closure provenance (raw#10 honest C3) ─────────────────
# v1.0.0 closure: 1/4 verbs PASS (weave) + 3/4 stubs.
# Honest scope: weave is empirical-sandbox only — theoretical / formal-mech
# content lives in canon/lean4-n6/N6/MechVerif/. n=6 invariant
# itself is verified via sympy + literature corpus only (no proprietary
# calibration).
[closure]
verbs_total = 4
verbs_wired = 1
verbs_stub = 3
verdict = "PARTIAL_PASS"
extracted_from = "nexus/sim_bridge/weave/ @ 2026-05-04"
upstream_marker = "anima/state/markers/hexa_bio_standalone_extraction_landed.marker"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "WEAVE: empirical sandbox (cage-assembly ODE + Caspar-Klug Bayesian audit). NANOBOT/RIBOZYME/VIROCAPSID: stub placeholders with falsifier preregister."
not_scope = ["AlphaFold-3 fold prediction (read-side; this toolkit is write-side)", "molecular dynamics (no GROMACS/NAMD bridge)", "drug discovery (no docking)", "in-vivo validation (purely numerical)"]
n6_lattice_caveat = "n=6 invariant (σ(6)=12, τ(6)=4, φ(6)=2, J₂=24) verified empirically only for weave (vertex count Bayesian audit, posterior 0.97). Other 3 axes inherit the lattice claim without independent verification."

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (pure hexa stubs + python stdlib for weave)"
weave_full_audit = "$0 (textbook corpus only, no network)"
weave_extended = "$0 (CPU-only ODE; --t-end 100000 ≈ 30s wall-clock)"
nanobot_ribozyme_virocapsid = "$0 (stubs print falsifier table + skeleton sentinel)"
