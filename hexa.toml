# hexa.toml — hexa-bio standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-bio
# Provenance: extracted from nexus/sim_bridge/weave/ on 2026-05-04
#             (canonical-from cycle 24, 2026-04-29 — canon sister)

[package]
name = "hexa-bio"
version = "1.0.0"
entry = "cli/hexa-bio.hexa"
description = "Molecular Toolkit (HEXA family): 5-axis — QUANTUM/WEAVE/NANOBOT/RIBOZYME/VIROCAPSID — organized around the n=6 invariant lattice (σ(6)=12, τ(6)=4, φ(6)=2, J₂=24). The 4 bio axes form the τ-quartet tetrahedron (weave wired with cage-assembly ODE + Caspar-Klug Bayesian audit; nanobot/ribozyme/virocapsid ship C0b skeleton simulators + falsifier preregister); the 5th axis (quantum) is the qpu_bridge VQE compute layer over qmirror (Phase 1+: H₂/LiH chemical/spectroscopic accuracy, F-Q-1…5 PASS, pocket-VQE F-Q-6 open). 5-axis count is locked. raw#10 honest C3."
license = "Apache-2.0"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-bio"
homepage = "https://github.com/dancinlab/hexa-bio"
readme = "README.md"
keywords = ["molecular-toolkit", "hexa-family", "quantum", "weave", "nanobot", "ribozyme", "virocapsid", "caspar-klug", "n6-invariant", "vqe", "qpu-bridge"]
categories = ["bioinformatics", "molecular-simulation", "structural-biology", "science"]

[lib]
# Library entry — importable by other hexa packages.
entry = "weave/module/weave.hexa"

[[bin]]
name = "hexa-bio"
path = "cli/hexa-bio.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_weave.hexa",
    "tests/test_nanobot.hexa",
    "tests/test_ribozyme.hexa",
    "tests/test_virocapsid.hexa",
    "tests/test_quantum.hexa",
    "tests/test_quantum_pilot_runner.hexa",
    "tests/test_selftest.hexa",
]

# ── hx install hook ───────────────────────────────────────
# install.hexa runs under hx package manager (hexa-lang) at install time.
# Phases: pre   → optional python_bridge deps (numpy/scipy for weave only;
#                 OPT-IN via HEXA_BIO_WITH_NUMPY=1, default skipped).
#         post  → quick selftest (warn-only, not a blocker).
[scripts]
install = "install.hexa"

# ── Modules manifest (5 axes + selftest) ──────────────────
# 5-axis framework (locked — .roadmap.axis_expansion_decision_2026_05_08):
#   weave      — IMPORTED from nexus/sim_bridge/weave/ (cycle 24 canonical) — WIRED
#   nanobot    — C0b skeleton (DNA-origami actuation sim + falsifier preregister)
#   ribozyme   — C0b skeleton (hammerhead-minimal kinetics sim + falsifier preregister)
#   virocapsid — C0b skeleton (capsid assembly sim + RCSB PDB corpus + falsifier preregister)
#   quantum    — qpu_bridge VQE / ML pilot dispatcher (Phase 1+; Python adapters in _python_bridge)
[modules]
hexa = [
    "weave/module/weave.hexa",
    "nanobot/module/nanobot.hexa",
    "ribozyme/module/ribozyme.hexa",
    "virocapsid/module/virocapsid.hexa",
    "quantum/module/quantum.hexa",
    "quantum/module/external_pilot_runner.hexa",
    "quantum/module/n6_lattice_check.hexa",
    "selftest/module/selftest.hexa",
]
python_bridge_aux = [
    # weave-only (raw#9 .own N opt-out — numpy/scipy heavy lifting).
    # Loaded only when HEXA_BIO_WITH_NUMPY=1; pure-hexa path is default.
    "_python_bridge/module/cage_assembly_simulation.py",
    "_python_bridge/module/polyhedral_cage_bayesian_audit.py",
    # virocapsid PDB corpus fetch (stdlib urllib only — no opt-in needed).
    "_python_bridge/module/virocapsid_pdb_corpus.py",
    # quantum axis: VQE adapters bridging the qmirror CLI (qiskit-aer opt-in;
    # see .roadmap.quantum). Default `hexa-bio quantum` needs no extra deps.
    # (quantum_*.py adapters loaded only on the full VQE path.)
]

# ── Dependencies ───────────────────────────────────────────
# hexa stdlib: required for all 5 axes (CLI dispatch, falsifier table, status).
# Optional Python deps:
#   numpy >= 1.24      — array ops for weave ODE state vec       (BSD-3, compatible)
#   scipy >= 1.11      — weave Bayesian audit pipeline           (BSD-3, compatible)
#   qiskit-aer >= 0.13 — quantum axis full VQE path (opt-in)     (Apache-2.0, compatible)
#
# Default paths (4-bio-axis skeletons + CLI router + status + `quantum` snapshot)
# require ZERO Python — pure hexa-lang.

[dependencies]
hexa-lang = ">=1.0.0"

[dependencies.optional]
python_aux_bsd3 = "numpy >= 1.24, scipy >= 1.11 (weave empirical path only; BSD-3 in-process safe; opt-in via HEXA_BIO_WITH_NUMPY=1)"
python_aux_quantum = "qiskit-aer >= 0.13 + qmirror (install via `hx install qmirror`) — quantum axis full VQE path only; Apache-2.0 in-process safe; default `hexa-bio quantum` prints a status snapshot with zero extra deps"

