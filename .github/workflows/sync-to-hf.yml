name: Sync GitHub → HF Hub mirror

# Auto-sync hexa-bio repository contents to the Hugging Face Hub mirror at
# huggingface.co/need-singularity/hexa-bio. Triggered on every push to main.
#
# REQUIRED SECRET: HF_TOKEN (write-scope token from
# https://huggingface.co/settings/tokens)
#
# Cost: $0 (public repo, GitHub Actions free tier; HF Hub free tier).

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ secrets.HF_TOKEN != '' }}
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Set up Python (for huggingface_hub CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.24"

      - name: Push to HF Hub mirror
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi, create_repo

          repo_id = "need-singularity/hexa-bio"
          token = os.environ["HF_TOKEN"]

          # Idempotent create (model type — see README §Caveats §5 rationale)
          create_repo(
              repo_id=repo_id,
              token=token,
              repo_type="model",
              exist_ok=True,
              private=False,
          )

          api = HfApi(token=token)
          api.upload_folder(
              folder_path=".",
              repo_id=repo_id,
              repo_type="model",
              ignore_patterns=[
                  ".git/*",
                  ".github/*",
                  "state/*.log",
                  "state/runs/*",
                  "**/__pycache__/*",
                  "**/*.pyc",
                  ".DS_Store",
              ],
              commit_message=f"sync from github main @ {os.environ.get('GITHUB_SHA', 'unknown')[:7]}",
          )
          print(f"hexa-bio: HF mirror push complete → https://huggingface.co/{repo_id}")
          PY
